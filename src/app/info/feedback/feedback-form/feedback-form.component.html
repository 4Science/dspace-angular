<div class="row row-offcanvas row-offcanvas-right">
  <div class="col-xs-12 col-sm-12 col-md-9">
    <h1>{{ 'info.feedback.head' | translate }}</h1>
    <p>{{ 'info.feedback.info' | translate }}</p>
    <form class="primary" [formGroup]="feedbackForm">
      <fieldset class="col p-0">
        <div class="row">
          <div class="control-group col-sm-12">
            <label class="control-label form-label" for="email">{{ 'info.feedback.email-label' | translate }}&nbsp;</label>
            <input id="email" class="form-control" name="email" type="text" value="" formControlName="email" autofocus="autofocus" title="{{ 'info.feedback.email_help' | translate }}">
            <small class="text-muted">{{ 'info.feedback.email_help' | translate }}</small>
          </div>
        </div>

        <div class="row" *ngIf="feedbackForm.controls.email.invalid && (feedbackForm.controls.email.dirty || feedbackForm.controls.email.touched)">
          <div class="col-sm-12 alert">
            <ds-error *ngIf="feedbackForm.controls.email.errors?.required" message="{{'info.feedback.error.email.required' | translate}}"></ds-error>
            <ds-error *ngIf="feedbackForm.controls.email.errors?.pattern" message="{{'info.feedback.error.email.required' | translate}}"></ds-error>
          </div>
        </div>

        <div class="row mt-3">
          <div class="control-group col-sm-12">
            <label class="control-label form-label" for="comments">{{ 'info.feedback.comments' | translate }}:&nbsp;</label>
            <textarea id="comments" formControlName="message" class="form-control" name="message" cols="20" rows="5"> </textarea>
          </div>
        </div>

        <div class="row" *ngIf="feedbackForm.controls.message.invalid && (feedbackForm.controls.message.dirty || feedbackForm.controls.message.touched)">
          <div class="col-sm-12 alert">
            <ds-error *ngIf="feedbackForm.controls.message.errors?.required" message="{{'info.feedback.error.message.required' | translate}}"></ds-error>
          </div>
        </div>

        <div class="row mt-3">
          <div class="control-group col-sm-12">
            <label class="control-label form-labe" for="page">{{ 'info.feedback.page-label' | translate }}&nbsp;</label>
            <input id="page" readonly class="form-control" name="page" type="text" value="" formControlName="page" autofocus="autofocus" title="{{ 'info.feedback.page_help' | translate }}">
            <small class="text-muted">{{ 'info.feedback.page_help' | translate }}</small>
          </div>
        </div>

        <div class="row py-2" *ngIf="!submissionVerification">
          <div class="control-group col-sm-12 text-end">
            <button [dsBtnDisabled]="!feedbackForm.valid" class="btn btn-primary" name="submit" (click)="createFeedback()">{{ 'info.feedback.send' | translate }}</button>
          </div>
        </div>
      </fieldset>

      <ds-alert *ngIf="submissionVerification && !isRecaptchaCookieAccepted()" [type]="AlertTypeEnum.Warning">
        <p class="m-0" [innerHTML]="MESSAGE_PREFIX + '.google-recaptcha.must-accept-cookies' | translate"></p>
        <p class="m-0"><a href="javascript:void(0);" (click)="openCookieSettings()">{{ MESSAGE_PREFIX + '.google-recaptcha.open-cookie-settings' | translate }}</a></p>
      </ds-alert>

      <div class="my-3" *ngIf="isRecaptchaCookieAccepted() && (googleRecaptchaService.captchaVersion() | async) === 'v2'">
        <ds-google-recaptcha [captchaMode]="(captchaMode() | async)"
          (executeRecaptcha)="submitFeedback($event)" (checkboxChecked)="onCheckboxChecked($event)"
        (showNotification)="showNotification($event)"></ds-google-recaptcha>
      </div>

      <div class="row py-2" *ngIf="submissionVerification">
        <div class="control-group col-sm-12 text-end">
          <ng-container *ngIf="!((captchaVersion() | async) === 'v2' && (captchaMode() | async) === 'invisible'); else invisibleBtn">
            <button class="btn btn-primary"
              [dsBtnDisabled]="feedbackForm.invalid || submissionVerification && !isRecaptchaCookieAccepted() || disableUntilChecked"
              (click)="submitFeedback()">
              {{ 'info.feedback.send' | translate }}
            </button>
          </ng-container>
          <ng-template #invisibleBtn>
            <button class="btn btn-primary" [dsBtnDisabled]="feedbackForm.invalid" (click)="executeRecaptcha()">
              {{ 'info.feedback.send' | translate }}
            </button>
          </ng-template>
        </div>
      </div>
    </form>
  </div>
</div>
